server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip static assets
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Proxy the hub's API calls to the واسط server (same origin, no CORS).
  # /api/auth/login  ->  server:8787/v1/auth/login
  location /api/ {
    proxy_pass http://server:8787/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # SPA: hashed assets are immutable; everything else falls back to index.html.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
  location / {
    try_files $uri $uri/ /index.html;
  }
}
