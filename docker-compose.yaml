# ============================================================
# DigiWP Ai Support — Coolify deployment
# ------------------------------------------------------------
# Three parts, one stack:
#   • server  — the واسط server (Node + SQLite)         [internal]
#   • hub     — the panel / main site (React via nginx)  [public]  ← نصب اصلی
#   • demo    — a real WordPress site + DB to pair with  [public]  ← دمو
#
# On Coolify: the `SERVICE_FQDN_*` vars make Coolify generate domains and
# route its proxy to the right container. Set AUTH_SECRET in the app's env.
# The hub serves the UI and proxies /api → server, so it's one origin.
#
# Local run (no Coolify):  AUTH_SECRET=dev docker compose up --build
#   then open the hub on the port you map (see the note near `hub.ports`).
# ============================================================

services:
  # ---- PostgreSQL — the hub's database ----
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=digiwp
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-digiwp}
      - POSTGRES_DB=digiwp
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digiwp -d digiwp"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ---- the واسط server (only backend the hub talks to) ----
  server:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      - PORT=8787
      - DATABASE_URL=postgres://digiwp:${POSTGRES_PASSWORD:-digiwp}@db:5432/digiwp
      - AUTH_SECRET=${AUTH_SECRET:-please-change-this-secret}
      - CORS_ORIGIN=*
      # Turn on live relay so paired sites are driven for real:
      - LIVE=1
      # Public URL of this API (where a connector reaches us) = hub domain + /api.
      - PUBLIC_BASE_URL=${SERVICE_URL_HUB:-http://localhost:8080}/api
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8787"

  # ---- the panel / main site (this is your primary install) ----
  hub:
    build:
      context: ./hub
    restart: unless-stopped
    environment:
      # Coolify: generate a domain for the hub, routed to its port 80.
      - SERVICE_FQDN_HUB_80
    depends_on:
      - server
    expose:
      - "80"
    # No host `ports:` here — on Coolify, routing is via its proxy (the
    # SERVICE_FQDN_HUB_80 var above). For local access, docker-compose.override.yaml
    # publishes a host port (auto-merged by `docker compose up`, ignored by Coolify).

  # ---- demo WordPress (a real managed site to pair with the hub) ----
  demo-db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      - MARIADB_DATABASE=wordpress
      - MARIADB_USER=wordpress
      - MARIADB_PASSWORD=${DEMO_DB_PASSWORD:-wordpress}
      - MARIADB_ROOT_PASSWORD=${DEMO_DB_ROOT_PASSWORD:-rootpw}
    volumes:
      - demo-db:/var/lib/mysql

  demo:
    image: wordpress:6.6-php8.2-apache
    restart: unless-stopped
    environment:
      - SERVICE_FQDN_DEMO_80
      - WORDPRESS_DB_HOST=demo-db
      - WORDPRESS_DB_NAME=wordpress
      - WORDPRESS_DB_USER=wordpress
      - WORDPRESS_DB_PASSWORD=${DEMO_DB_PASSWORD:-wordpress}
      # Make WordPress aware of its public URL behind the proxy.
      - |
        WORDPRESS_CONFIG_EXTRA=
        if (!empty($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') { $$_SERVER['HTTPS'] = 'on'; }
        define('WP_HOME', getenv('SERVICE_URL_DEMO') ?: 'http://localhost:8081');
        define('WP_SITEURL', getenv('SERVICE_URL_DEMO') ?: 'http://localhost:8081');
    volumes:
      - demo-wp:/var/www/html
      # Ship the WP Claude Bridge connector into the demo site.
      - ./wp-claude-bridge.php:/var/www/html/wp-content/plugins/wp-claude-bridge/wp-claude-bridge.php:ro
      - ./skills:/var/www/html/wp-content/plugins/wp-claude-bridge/skills:ro
    depends_on:
      - demo-db
    expose:
      - "80"
    # No host `ports:` (see the hub note) — Coolify routes via SERVICE_FQDN_DEMO_80.

volumes:
  pg-data:
  demo-db:
  demo-wp:
