# ============================================================
# Local development port mappings — publish the services on localhost.
#
# NOT a `docker-compose.override.yaml` on purpose: that name is auto-merged
# by `docker compose` AND gets picked up by Coolify (which then tries to build
# from it and fails). Living under deploy/ keeps it invisible to Coolify.
#
# Use it explicitly:
#   docker compose -f docker-compose.yaml -f deploy/compose.local.yml up --build
#
#   hub:    http://localhost:8080   (change with HUB_PORT)
#   server: http://localhost:8787   (the واسط API — health at /health, API under /v1)
#   demo:   http://localhost:8081   (change with DEMO_PORT)
# ============================================================
services:
  hub:
    ports:
      - "${HUB_PORT:-8080}:80"
  server:
    ports:
      - "${SERVER_PORT:-8787}:8787"
  demo:
    ports:
      - "${DEMO_PORT:-8081}:80"
