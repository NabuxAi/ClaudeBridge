# ============================================================
# Local development overrides.
#
# `docker compose up` auto-merges this file, so the hub + demo are
# reachable on localhost. Coolify runs `docker compose -f docker-compose.yaml`
# explicitly, which does NOT auto-load overrides — so these host port
# bindings never apply on Coolify (where routing is via its proxy).
#
#   hub:  http://localhost:8080   (change with HUB_PORT)
#   demo: http://localhost:8081   (change with DEMO_PORT)
# ============================================================
services:
  hub:
    ports:
      - "${HUB_PORT:-8080}:80"
  demo:
    ports:
      - "${DEMO_PORT:-8081}:80"
